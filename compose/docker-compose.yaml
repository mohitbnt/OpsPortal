networks:
    frontend-net:
        name: ${ENVIRONMENT_NAME}_opsportal-frontend-net
        driver: bridge
    backend-net:
        name: ${ENVIRONMENT_NAME}_opsportal-backend-net
        driver: bridge
    monitoring-net:
        name: opsportal-monitoring-net

volumes:
  postgres-data:
    name: ${ENVIRONMENT_NAME}_opsportal-postgres-data

  redis-data:
    name: ${ENVIRONMENT_NAME}_opsportal-redis-data

  prometheus-data:
    name: opsportal-prometheus-data

  grafana-data:
    name: opsportal-grafana-data     

services:
      postgres:
        container_name: ${ENVIRONMENT_NAME}_opsportal_postgres
        image: postgres:16
        hostname: ${ENVIRONMENT_NAME}_opsportal_postgres
        restart: unless-stopped
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"
        env_file:
          - ./postgres.env
        volumes:
          - postgres-data:/var/lib/postgresql/data
          - ../backup/postgres/init:/docker-entrypoint-initdb.d:ro
        networks:
          - backend-net
        healthcheck:
          test: 
            - CMD-SHELL
            - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 10s  

      redis:
        container_name: ${ENVIRONMENT_NAME}_opsportal_redis
        image: redis:7
        hostname: ${ENVIRONMENT_NAME}_opsportal_redis
        command: 
          - redis-server
          - /usr/local/etc/redis/redis.conf
        restart: unless-stopped
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"
        volumes:
          - redis-data:/data
          - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
        networks:
          - backend-net
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 10s
          timeout: 5s
          retries: 5  

      backend-app:
        build:
          context: ../backend
          dockerfile: Dockerfile
          args:
            IMAGE_VERSION: ${IMAGE_VERSION}
        image: ${DOCKERHUB_USERNAME}/opsportal-backend:${IMAGE_VERSION}
        restart: unless-stopped
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"
        env_file:
          - ./backend.env
        depends_on:
          postgres:
            condition: service_healthy
          redis:
            condition: service_healthy
        networks:
          - backend-net

      frontend-app:
        build:
          context: ../
          dockerfile: ./frontend/Dockerfile
          args:
            IMAGE_VERSION: ${IMAGE_VERSION}
        image: ${DOCKERHUB_USERNAME}/opsportal-frontend:${IMAGE_VERSION}
        restart: unless-stopped
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"
        ports:
          - "80:80"
        env_file:
          - ./frontend.env
        depends_on:
          backend-app:
            condition: service_healthy
        networks:
          - frontend-net
          - backend-net    

      node-exporter:
        image: prom/node-exporter:v1.9.1
        container_name: node-exporter
        restart: unless-stopped
        command:
          - "--path.rootfs=/host"
        pid: host
        volumes:
          - "/:/host:ro,rslave"
        networks:
          - monitoring-net
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"

      cadvisor:
        image: gcr.io/cadvisor/cadvisor:latest-ghcr
        container_name: cadvisor
        restart: unless-stopped
        volumes:
          - /:/rootfs:ro
          - /var/run:/var/run:ro
          - /var/run/docker.sock:/var/run/docker.sock:ro
          - /sys:/sys:ro
          - /var/lib/docker:/var/lib/docker:ro
          - /dev/disk:/dev/disk:ro
        networks:
          - monitoring-net
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"

      prometheus:
        image: prom/prometheus:v3.5.0
        container_name: prometheus
        restart: unless-stopped
        command:
          - "--config.file=/etc/prometheus/prometheus.yml"
        volumes:
          - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
          - prometheus-data:/prometheus
        networks:
          - monitoring-net
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"

      grafana:
        image: grafana/grafana:12.1.1
        container_name: grafana
        restart: unless-stopped
        depends_on:
          - prometheus
        ports:
          - 3000:3000
        environment:
          GF_SECURITY_ADMIN_USER: admin
          GF_SECURITY_ADMIN_PASSWORD: admin
        volumes:
          - grafana-data:/var/lib/grafana
          - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
          - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
        networks:
          - monitoring-net
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "5"